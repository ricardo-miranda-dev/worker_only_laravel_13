services:

  # ─── PHP-FPM (Laravel App) ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      - db
      - redis
    networks:
      - worker_network

  # ─── Nginx ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: worker_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - worker_network

  # ─── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: worker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-worker_db}
      POSTGRES_USER: ${DB_USERNAME:-worker_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - worker_network
  
  # PGAdmin4
  pgadmin:
    image: dpage/pgadmin4
    container_name: worker_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: "rmiranda@datafact.com.ec"
      PGADMIN_DEFAULT_PASSWORD: "1q2w3e4r5tDataFact"
    ports:
      - "8081:80" # Tu Ubuntu en 8081 -> pgAdmin interno en 80
    restart: always
    depends_on:
      - db
    networks:
      - worker_network

  # ─── Redis (Queues) ───────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: worker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - worker_network

  # ─── Queue Worker ─────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=60
    depends_on:
      - app
      - redis
    networks:
      - worker_network

  # ─── Scheduler (cron) ─────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan schedule:work
    depends_on:
      - app
      - db
    networks:
      - worker_network

networks:
  worker_network:
    driver: bridge

volumes:
  db_data:
    driver: local
